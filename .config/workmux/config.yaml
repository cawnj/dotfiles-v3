nerdfont: true
agent: claude

# disable automatic tmux format modification
status_format: false

panes:
  - command: <agent>
  - split: horizontal
    focus: true

files:
  symlink:
    - docs/superpowers
    - .claude/settings.local.json
  copy:
    - flake.nix

# workaround since nix won't read an untracked flake.nix
post_create:
  - git add -fN flake.nix

sandbox:
  enabled: true
  backend: lima
  toolchain: flake
  lima:
    # shared .claude folder
    provision: |
      #!/bin/bash
      set -eux
      sudo ln -sfn "$HOME/.claude" "/Users/$USER/.claude"
      echo "export CLAUDE_CONFIG_DIR=/Users/$USER/.claude" >> "$HOME/.profile"
