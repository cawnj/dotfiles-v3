nerdfont: true
agent: claude

# disable automatic tmux format modification
status_format: false

panes:
  - command: <agent>
  - split: horizontal
    focus: true

files:
  symlink:
    - docs/superpowers
    - devbox.json
    - .claude/settings.local.json

sandbox:
  enabled: true
  backend: lima
  toolchain: auto
