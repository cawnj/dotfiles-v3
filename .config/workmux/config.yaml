nerdfont: true
agent: claude

# disable automatic tmux format modification
status_format: false

panes:
  - command: <agent>
  - split: horizontal
    focus: true

files:
  symlink:
    - docs/superpowers
    - .claude/settings.local.json
    - devbox.json

sandbox:
  enabled: true
  backend: lima
  toolchain: devbox
  agent_config_dir: ~/.claude-sandbox
  env_passthrough:
    - GITHUB_PACKAGES_TOKEN
