nerdfont: true
agent: claude

# disable automatic tmux format modification
status_format: false

panes:
  - command: <agent>
  - split: horizontal
    focus: true

files:
  symlink:
    - docs/superpowers
    - .claude/settings.local.json
  copy:
    - flake.nix

# workaround since nix won't read an untracked flake.nix
post_create:
  - git add -fN flake.nix

sandbox:
  enabled: true
  backend: lima
  toolchain: flake
  agent_config_dir: ~/.claude-sandbox
