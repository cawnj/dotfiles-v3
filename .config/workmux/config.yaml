nerdfont: true
agent: claude

# disable automatic tmux format modification
status_format: false

panes:
  - command: <agent>
  - split: horizontal
    focus: true

files:
  symlink:
    - docs/superpowers
    - .claude/settings.local.json
    - devbox.json

sandbox:
  enabled: true
  backend: lima
  toolchain: devbox
  agent_config_dir: ~/.claude-sandbox
  env_passthrough:
    - GITHUB_PACKAGES_TOKEN
    - NODE_AUTH_TOKEN
  env:
    DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    UseSharedCompilation: "false"  # disable Roslyn compile server
  extra_mounts:
    - host_path: ~/.config/workmux
      guest_path: /opt/workmux
  lima:
    memory: 4GiB
    provision: |
      # git commit signing
      git config --global commit.gpgsign true
      git config --global gpg.format ssh
      git config --global user.signingkey /opt/workmux/sandbox.pub

      # add nix to PATH
      echo 'export PATH="/nix/var/nix/profiles/default/bin:$PATH"' >> ~/.bashrc

      # fish plugins
      mkdir -p ~/.config/fish
      cat > ~/.config/fish/config.fish <<'FISHCONFIG'
      if not functions -q fisher
          curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source
          fisher install jorgebucaran/fisher jhillyerd/plugin-git
      end
      FISHCONFIG
